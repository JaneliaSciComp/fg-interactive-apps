name: marimo
description: Run a marimo reactive Python notebook server on a cluster node, via Apptainer.
requirements:
  - apptainer

runnables:
  - id: serve
    name: Server
    type: service
    description: >-
      Start a marimo reactive notebook editor and open it in your browser.
      Runs until you stop it.
    # auto_url is intentionally NOT set. We publish the service URL ourselves,
    # once marimo is actually listening, with the access token embedded so
    # "Open Service" logs in with one click. Fileglancer provides the free port
    # ($FG_SERVICE_PORT) and hostname ($FG_HOSTNAME) for service jobs. marimo
    # runs directly via `apptainer exec`.
    container: docker://ghcr.io/marimo-team/marimo:latest-sql
    command: >-
      marimo edit
      --headless
      --host 0.0.0.0
      --port $FG_SERVICE_PORT
      --token-password="$MARIMO_TOKEN"
    pre_run: |
      # Mint a one-time access token; marimo accepts it in the URL as
      # ?access_token=<token>, so a single click authenticates.
      export MARIMO_TOKEN="$(openssl rand -hex 16 2>/dev/null || date +%s%N | sha256sum | cut -c1-32)"
      # Publish the URL only once marimo is accepting connections — the image
      # may still be pulling and the server takes a moment to bind — so the
      # "Open Service" link never points at a not-yet-ready server. Apptainer
      # shares the host network, so the container's 0.0.0.0:$FG_SERVICE_PORT is
      # reachable at 127.0.0.1 here. Runs in the background while marimo starts.
      (
        for _ in $(seq 1 1800); do
          if (exec 3<>"/dev/tcp/127.0.0.1/$FG_SERVICE_PORT") 2>/dev/null; then
            printf 'http://%s:%s/?access_token=%s' \
              "$FG_HOSTNAME" "$FG_SERVICE_PORT" "$MARIMO_TOKEN" > "$SERVICE_URL_PATH"
            break
          fi
          sleep 1
        done
      ) &
      echo "Starting marimo — the service link will appear once it is ready."
    parameters:
      - name: Notebook or Folder
        type: directory
        description: >-
          Notebook file or directory to open in marimo (optional). Must be
          within a mounted file share; it is bind-mounted into the container
          automatically.
        required: false

    resources:
      cpus: 2
      memory: "8 GB"
      walltime: "08:00"
