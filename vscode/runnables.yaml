name: OpenVSCode
description: Run a browser-based VS Code IDE (openvscode-server) on a cluster node, via Apptainer.
# openvscode-server is pulled and run entirely inside an Apptainer container, so
# the only host requirement is Apptainer itself. The container is cached per-user
# under ~/.fileglancer/apptainer_cache on first launch and reused afterwards.
requirements:
    - apptainer

runnables:
    - id: serve
      name: Server
      type: service
      description: >-
          Start a VS Code (openvscode-server) instance and open it in your browser.
          Runs until you stop it.
      # Fileglancer publishes the service URL once the port is live (auto_url) and
      # embeds the connection token it minted ($FG_SERVICE_TOKEN) via
      # service_url_suffix (?tkn=...), so "Open Service" authenticates in a single
      # click. The same token is passed to the server with --connection-token.
      auto_url: true
      service_url_suffix: "/?tkn=${FG_SERVICE_TOKEN}"
      container: docker://gitpod/openvscode-server:latest
      command: >-
          /home/.openvscode-server/bin/openvscode-server
          --host 0.0.0.0
          --port $FG_SERVICE_PORT
          --connection-token "$FG_SERVICE_TOKEN"
          --user-data-dir "$HOME/.openvscode-server/data"
          --extensions-dir "$HOME/.openvscode-server/extensions"
      parameters:
          - flag: --default-folder
            name: Folder
            type: directory
            description: >-
                Folder to open in VS Code (optional). Must be within a mounted file
                share; it is bind-mounted into the container automatically.
            required: false
            exists: true

      resources:
          cpus: 2
          memory: "8 GB"
          walltime: "08:00"
